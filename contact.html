<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | DonutCo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .contact-main {
            padding: 8rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
        }
        .contact-info h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .info-detail {
            margin-bottom: 2rem;
        }
        .info-detail h3 {
            font-size: 1.1rem;
            color: var(--magenta);
            margin-bottom: 0.5rem;
        }
        .contact-form {
            background: var(--white);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--gray-100);
            background: var(--gray-50);
            font-family: inherit;
        }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--gray-900);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-submit:hover {
            background: var(--magenta);
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .contact-main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <!-- Logo -->
            <a href="index.html" class="logo">
                <span class="logo-text">Donut<span class="logo-accent">Co</span></span>
            </a>
            <!-- Navigation -->
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="menu.html" class="nav-link">Menu</a></li>
                    <li><a href="specials.html" class="nav-link">Specials</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="contact.html" class="nav-link active">Contact</a></li>
                </ul>
            </nav>
            <!-- Header Actions -->
            <div class="header-actions">
                <a href="cart.html" class="cart-link">
                    <button class="icon-btn cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span class="cart-badge" id="cart-count">0</span>
                    </button>
                </a>
                <a href="profile.html" class="profile-link">
                    <button class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                    </button>
                </a>
                <a href="menu.html">
                    <button class="btn-order-header">Order Now</button>
                </a>
            </div>
        </div>
    </header>

    <main class="contact-main">
        <div class="contact-info">
            <h1>Get in <span class="title-accent">Touch.</span></h1>
            <div class="info-detail">
                <h3>Visit Us</h3>
                <p>123 Donut Street<br>Sweet City, SC 90210</p>
            </div>
            <div class="info-detail">
                <h3>Hours</h3>
                <p>Mon - Fri: 6am - 8pm<br>Sat - Sun: 7am - 10pm</p>
            </div>
            <div class="info-detail">
                <h3>Call</h3>
                <p>(555) 123-4567</p>
            </div>
        </div>

        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent! We\'ll get back to you soon.');">
            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="Tell us what's on your mind..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </main>

    <script>
        const cart = JSON.parse(localStorage.getItem('donutCart')) || [];
        document.getElementById('cart-count').textContent = cart.reduce((s, i) => s + i.quantity, 0);
    </script>
</body>
</html>
